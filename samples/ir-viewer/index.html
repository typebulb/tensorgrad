<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>IR viewer (tensorgrad)</title>
  <style>
    :root { color-scheme: light; }
    body { font-family: ui-sans-serif, system-ui, sans-serif; margin: 0; padding: 0 1rem 1rem; }
    header {
      position: sticky; top: 0; z-index: 10;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 0.75rem 0 0.6rem;
      margin: 0 0 0.75rem;
    }
    header .banner { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; flex-wrap: wrap; }
    header .banner-left { flex: 1 1 auto; min-width: 0; }
    header .banner-right { display: flex; flex-direction: column; align-items: flex-end; gap: 0.4rem; }
    header h1 { font-size: 1.2rem; margin: 0; }
    header a.back { color: #06c; text-decoration: none; font-size: 0.85rem; }
    header a.back:hover { text-decoration: underline; }
    header p { color: #666; margin: 0.35rem 0 0; font-size: 0.88rem; }
    a { color: #06c; }
  </style>
</head>
<body>
  <header>
    <div class="banner">
      <div class="banner-left">
        <h1>IR viewer (tensorgrad)</h1>
        <p>Pick a sample to inspect its compiled training graph. Source code lines become edges between tensor nodes; branches at the same topological depth render side-by-side.</p>
      </div>
      <div class="banner-right">
        <div id="picker-mount"></div>
        <a class="back" href="/">← samples</a>
      </div>
    </div>
  </header>
  <main>
    <div id="ir-mount"></div>
  </main>
  <script type="module" src="./main.ts"></script>
</body>
</html>
