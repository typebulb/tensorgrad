<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>MLP fits sin(x)</title>
  <style>
    body { font-family: ui-sans-serif, system-ui, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.4rem; }
    button { padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; }
    canvas { display: block; border: 1px solid #ccc; border-radius: 6px; margin: 1rem 0; }
    #log { background: #111; color: #ddd; padding: 1rem; border-radius: 6px; font-family: ui-monospace, monospace; font-size: 12px; height: 240px; overflow-y: auto; white-space: pre-wrap; }
    .err { color: #f88; }
    .ok { color: #8f8; }
  </style>
</head>
<body>
  <h1>MLP fits sin(x)</h1>
  <p>2-layer MLP (1 → 64 → 64 → 1) trained to approximate <code>y = sin(x)</code> over [-π, π]. Same tensorgrad pipeline as the transformer — autograd + Adam + WGSL — just on a much smaller model.</p>
  <p><a href="/">← back to samples</a></p>
  <button id="run">Train</button>
  <button id="stop" disabled>Stop</button>
  <canvas id="plot" width="800" height="240"></canvas>
  <div id="log"></div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
