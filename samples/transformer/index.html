<!DOCTYPE html>
<html>
<head>

  <title>Transformer (tensorgrad)</title>
  <style>
    body { font-family: ui-sans-serif, system-ui, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
